    </linearGradient>
    <linearGradient id="zian-monolith-rim-gradient" x1="108" y1="54" x2="258" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a3ff12" stop-opacity="0.85" />
