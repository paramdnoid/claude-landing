<svg
  class="zian-monolith-signet zian-monolith-signet--hero"
  viewBox="0 0 360 360"
  focusable="false"
  role="img"
  aria-labelledby="zian-monolith-title zian-monolith-description"
  xmlns="http://www.w3.org/2000/svg"
  style="--zian-rim-gradient: url(#zian-monolith-rim-gradient);"
>
  <title id="zian-monolith-title">ZIAN monolith signet</title>
  <desc id="zian-monolith-description">A dark faceted monolith mark with a plasma-tinted Z, plasma aura, reflection, rim highlights, and engraved detail lines.</desc>
  <defs>
    <radialGradient id="zian-monolith-aura-gradient" cx="50%" cy="38%" r="62%">
      <stop offset="0" stop-color="#a3ff12" stop-opacity="0.18" />
      <stop offset="0.45" stop-color="#06b6d4" stop-opacity="0.12" />
      <stop offset="0.8" stop-color="#6366f1" stop-opacity="0.06" />
      <stop offset="1" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="zian-monolith-shell-gradient" x1="100" y1="58" x2="250" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11111a" />
      <stop offset="0.42" stop-color="#0a0a0f" />
      <stop offset="1" stop-color="#050507" />
    </linearGradient>
    <linearGradient id="zian-monolith-shell-left-gradient" x1="91" y1="70" x2="177" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a3ff12" stop-opacity="0.12" />
      <stop offset="0.36" stop-color="#06b6d4" stop-opacity="0.06" />
      <stop offset="1" stop-color="#050507" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="zian-monolith-shell-right-gradient" x1="259" y1="82" x2="166" y2="295" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.14" />
      <stop offset="0.48" stop-color="#06b6d4" stop-opacity="0.05" />
      <stop offset="1" stop-color="#050507" stop-opacity="0.12" />
    </linearGradient>
    <linearGradient id="zian-monolith-z-body-gradient" x1="95" y1="93" x2="249" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4ff6e" stop-opacity="0.95" />
      <stop offset="0.42" stop-color="#a3ff12" stop-opacity="0.95" />
      <stop offset="1" stop-color="#4a7300" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="zian-monolith-z-highlight-gradient" x1="100" y1="91" x2="240" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7" />
