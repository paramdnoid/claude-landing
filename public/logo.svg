    <path d="M114 104h132v32l-72 47h72v32H114v-32l72-47h-72v-32z" fill="url(#zian-monolith-z-body-gradient)" stroke="rgba(255, 255, 255, 0.38)" stroke-linejoin="round" stroke-width="1.05" />
    <path d="M114 104h132v32H114z" fill="url(#zian-monolith-z-highlight-gradient)" />
    <path d="M186 136h60l-72 47h-60z" fill="url(#zian-monolith-z-highlight-gradient)" opacity="0.56" />
    <path d="M114 183h132v32H114z" fill="url(#zian-monolith-z-highlight-gradient)" opacity="0.26" />
