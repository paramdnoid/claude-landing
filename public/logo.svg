      <stop offset="0.72" stop-color="#6366f1" stop-opacity="0.75" />
      <stop offset="1" stop-color="#1e1b4b" stop-opacity="0.4" />
    </linearGradient>
    <filter id="zian-monolith-inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#050507" flood-opacity="0.75" />
    </filter>
    <filter id="zian-monolith-glow" x="-30%" y="-30%" width="160%" height="160%">
